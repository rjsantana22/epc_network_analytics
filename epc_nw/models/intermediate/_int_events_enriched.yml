version: 2

models:
  - name: int_events_enriched
    description: "Eventos enriquecidos con información de PLMN y APN"
    columns:
      - name: event_id
        data_tests:
          - not_null
      - name: event_timestamp
        data_tests:
          - not_null
      - name: event_type
        data_tests:
          - not_null
      - name: imsi
        data_tests:
          - not_null
      - name: mme_id
        data_tests:
          - not_null
      - name: cause_code
        data_tests:
          - not_null
      - name: tracking_area,
      - name: cell_id
        data_tests:
          - not_null
      - name: apn
        data_tests:
          - not_null
      - name: plmn_id
        data_tests:
          - not_null
      - name: result
        data_tests:
          - not_null
          - accepted_values:
              values: ['success', 'failure']  

      - name: apn_key
        data_tests:
          - not_null
      - name: area_key
        data_tests:
          - not_null
      - name: plmn_key
        data_tests:
          - not_null