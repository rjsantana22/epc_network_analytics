version: 2

models:
  - name: fct_event_by_apn
    description: "Hecho de eventos por APN (Access Point Name)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - apn_key
              - event_timestamp
              - cause_code
    columns:
      - name: apn_key
        data_tests:
          - not_null
          - relationships:
              arguments:  
                to: ref('dim_apn')
                field: apn_key
      - name: event_timestamp
        data_tests:
          - not_null
      - name: event_date
        data_tests:
          - not_null
      - name: event_time
        data_tests:
          - not_null
      - name: cause_code
        data_tests:
          - not_null
      - name: total_events
        data_tests:
          - not_null