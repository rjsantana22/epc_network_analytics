# _fct_sessions.yml
version: 2

models:
  - name: fct_sessions
    description: "Tabla de hechos: eventos de red por sesión"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - imsi
              - mme_id
              - apn_key
              - area_key
              - plmn_key
              - event_timestamp
    columns:
      - name: imsi
        data_tests:
          - not_null
      - name: mme_id
        data_tests:
          - not_null
      - name: apn_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_apn')
                field: apn_key
      - name: area_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_area')
                field: area_key
      - name: plmn_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_plmn')
                field: plmn_key
      - name: session_date
        data_tests:
          - not_null
      - name: session_time
        data_tests:
          - not_null
      - name: total_events
        data_tests:
          - not_null
      - name: attach_count
        data_tests:
          - not_null
      - name: handover_count
        data_tests:
          - not_null
      - name: paging_count
        data_tests:
          - not_null
      - name: service_request_count
        data_tests:
          - not_null