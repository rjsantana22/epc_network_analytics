# _fct_sessions.yml
version: 2

models:
  - name: fct_sessions
    description: "Tabla de hechos: eventos de red por sesión"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - imsi
            - mme_id
            - apn_key
            - area_key
            - plmn_key
            - session_date
            - session_time
    columns:
      - name: imsi
        data_tests:
          - not_null
      - name: mme_id
        data_tests:
          - not_null
      - name: apn_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_apn')
              field: apn_key
      - name: area_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_area')
              field: area_key
      - name: plmn_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_plmn')
              field: plmn_key
      - name: session_date
        data_tests:
          - not_null
      - name: session_time
        data_tests:
          - not_null
      - name: total_events
        data_tests:
          - not_null
      - name: attach_count
        data_tests:
          - not_null
      - name: detach_count
        data_tests:
          - not_null