id: run_dbt
namespace: epc.networks

tasks:

  - id: dbt_project
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repository
        type: io.kestra.plugin.git.Clone
        url: https://github.com/rjsantana22/epc_network_analytics
        branch: main

      - id: dbt_bigquery_build
        type: io.kestra.plugin.dbt.cli.DbtCLI
        containerImage: ghcr.io/kestra-io/dbt-bigquery:latest  # pin to a real tag you've verified
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        projectDir: epc_nw
        commands:
          - dbt deps #--project-dir epc_nw
          - dbt build --target dev #--project-dir epc_nw --target dev
        inputFiles:
          sa.json: "{{ kv('GCP_CREDS') }}"
        profiles: |
          epc_nw:
            outputs:
              dev:
                type: bigquery
                method: service-account-json
                project: {{ kv('GCP_PROJECT_ID') }} # Replace with your GCP Project ID
                dataset: {{ kv('GCP_DATASET') }} # Replace with your BigQuery dataset
                location: "{{ kv('GCP_LOCATION') }}"
                threads: 4
                keyfile_json: sa.json # Ensure this secret is configured in Kestra
            target: dev