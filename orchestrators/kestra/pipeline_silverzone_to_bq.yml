id: pipeline_silverzone_to_bq
namespace: epc.networks

triggers:
  - id: trigger_dataproc_pipeline
    type: io.kestra.plugin.core.trigger.Flow
    # Se ejecuta cuando los siguientes flujos cumplen estas condiciones
    preconditions:
      id: flows
      flows:
        - namespace: epc.networks
          flowId: dataproc_pipeline
          states: [SUCCESS]

tasks:
  - id: start_export
    type: io.kestra.plugin.core.log.Log
    message: Starting GCS to BigQuery export...

  - id: load_gcs_to_bigquery
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    from:
      - "gs://{{ kv('GCP_BUCKET_NAME') }}/silver/batch/staging/*.parquet" # Replace with your GCS path
    destinationTable: "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.events_epc_network"
    # Replace with your BigQuery table
    format: PARQUET
    autodetect: true
    writeDisposition: WRITE_APPEND # Acumula cada batch; no reemplaza la tabla
    createDisposition: CREATE_IF_NEEDED
 
  - id: move_processed_parquet
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    commands:
      - |
        set -e
        gcloud storage mv \
          "gs://{{ kv('GCP_BUCKET_NAME') }}/silver/batch/staging/{{ trigger.executionId }}/*.parquet" \
          "gs://{{ kv('GCP_BUCKET_NAME') }}/silver/batch/processed/{{ trigger.executionId }}/"

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      dataset: "{{ kv('GCP_DATASET') }}"
      serviceAccount: "{{ kv('GCP_CREDS') }}"
      projectId: "{{ kv('GCP_PROJECT_ID') }}"
      location: "{{ kv('GCP_LOCATION') }}"
      bucket: "{{ kv('GCP_BUCKET_NAME') }}"
      region: "{{ kv('GCP_REGION') }}"
      clusterName: "{{ kv('GCP_CLUSTER_NAME') }}"
      pythonFilename: "{{ kv('GCP_PYTHON_FILE_NAME') }}"